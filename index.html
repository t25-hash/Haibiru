<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>深夜の廃ビル</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Share+Tech+Mono&display=swap');

:root {
  --bg: #080810;
  --panel: #0e0e1a;
  --border: #1c1c30;
  --red: #c0392b;
  --red-glow: #e74c3c;
  --text: #c8c8d8;
  --dim: #505060;
  --white: #eeeef8;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }

body {
  background: var(--bg); color: var(--text);
  font-family: 'Noto Serif JP', serif;
  display: flex; flex-direction: column;
  padding-top: var(--safe-top); padding-bottom: var(--safe-bot);
}

/* スプラッシュ */
#splash {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 20px; z-index: 100; transition: opacity 0.6s ease;
}
#splash.fade { opacity: 0; pointer-events: none; }
.splash-eye { font-size: 52px; animation: eyePulse 2s ease-in-out infinite; }
@keyframes eyePulse {
  0%,100% { transform: scale(1); filter: drop-shadow(0 0 8px rgba(192,57,43,0.4)); }
  50%      { transform: scale(1.1); filter: drop-shadow(0 0 20px rgba(192,57,43,0.8)); }
}
.splash-title { font-size: 22px; font-weight: 700; color: var(--white); letter-spacing: 0.08em; }
.splash-sub   { font-size: 11px; color: var(--dim); font-family: 'Share Tech Mono', monospace; letter-spacing: 0.12em; }
.splash-user  { font-size: 13px; color: var(--dim); font-family: 'Share Tech Mono', monospace; min-height: 18px; }
.splash-dots  { display: flex; gap: 6px; }
.splash-dots span {
  width: 6px; height: 6px; border-radius: 50%; background: var(--dim);
  animation: dotBlink 1.2s infinite;
}
.splash-dots span:nth-child(2) { animation-delay: 0.2s; }
.splash-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotBlink {
  0%,80%,100% { opacity: 0.2; }
  40% { opacity: 1; background: var(--red-glow); }
}

/* ヘッダー */
.header {
  flex-shrink: 0; background: rgba(14,14,26,0.95);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(192,57,43,0.15);
  padding: 10px 16px; display: flex; align-items: center; gap: 10px;
}
.header-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, #c0392b, #7d1a0e);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0; box-shadow: 0 0 10px rgba(192,57,43,0.35);
}
.header-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
.header-info { flex: 1; min-width: 0; }
.header-title {
  font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--white);
  letter-spacing: 0.04em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.header-sub { font-size: 10px; color: var(--dim); font-family: 'Share Tech Mono', monospace; }
.header-hp { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--dim); text-align: right; flex-shrink: 0; }
.hp-mini-bar { width: 48px; height: 3px; background: #1a1a2e; border-radius: 2px; overflow: hidden; margin-top: 3px; }
.hp-mini-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease, background 0.5s; }

/* チャット */
.chat {
  flex: 1; overflow-y: auto; padding: 16px 14px 8px;
  display: flex; flex-direction: column; gap: 9px;
  scroll-behavior: smooth; overscroll-behavior: contain;
}
.chat::-webkit-scrollbar { width: 2px; }
.chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 1px; }

.bubble {
  max-width: 84%; padding: 10px 13px; border-radius: 16px;
  font-size: 14px; line-height: 1.75;
  animation: fadeUp 0.32s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.bubble.bot {
  background: #141425; border: 1px solid rgba(192,57,43,0.15);
  border-bottom-left-radius: 3px; color: var(--text); align-self: flex-start;
}
.bubble.user {
  background: linear-gradient(135deg, #172917, #112011);
  border: 1px solid rgba(46,204,113,0.18);
  border-bottom-right-radius: 3px; color: #9ed09e; align-self: flex-end; font-size: 13px;
}
.bubble.system {
  background: transparent; border: none; color: var(--dim);
  font-size: 10px; font-family: 'Share Tech Mono', monospace;
  letter-spacing: 0.1em; align-self: center; padding: 4px 0;
}
/* グレイブルート専用 */
.bubble.grave {
  background: #1a0f0f; border: 1px solid rgba(192,57,43,0.4);
  border-bottom-left-radius: 3px; color: #d4a0a0; align-self: flex-start;
  box-shadow: 0 0 20px rgba(192,57,43,0.1);
}

/* HP chip */
.hp-chip {
  align-self: flex-start; display: flex; align-items: center; gap: 8px;
  padding: 7px 12px; background: rgba(192,57,43,0.06);
  border: 1px solid rgba(192,57,43,0.2); border-radius: 10px;
  font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--red-glow);
  animation: fadeUp 0.3s ease both;
}
.hp-chip-bar { height: 4px; width: 60px; background: #1a1a2e; border-radius: 2px; overflow: hidden; }
.hp-chip-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }

/* タイピング */
.typing {
  display: flex; gap: 4px; align-items: center; padding: 11px 14px;
  background: #141425; border: 1px solid rgba(192,57,43,0.12);
  border-radius: 16px; border-bottom-left-radius: 3px;
  align-self: flex-start; animation: fadeUp 0.28s ease both;
}
.typing span { width: 5px; height: 5px; border-radius: 50%; background: var(--dim); animation: typingDot 1.1s infinite; }
.typing span:nth-child(2) { animation-delay: 0.18s; }
.typing span:nth-child(3) { animation-delay: 0.36s; }
@keyframes typingDot {
  0%,75%,100% { opacity: 0.25; transform: scale(0.8); }
  35% { opacity: 1; transform: scale(1); }
}

/* 選択肢 */
.choices {
  flex-shrink: 0; padding: 10px 12px 12px;
  display: flex; flex-direction: column; gap: 7px;
  border-top: 1px solid var(--border);
  background: rgba(8,8,16,0.9);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
}
.choice-btn {
  width: 100%; padding: 11px 14px; background: #10101e;
  border: 1px solid var(--border); border-radius: 12px; color: var(--text);
  font-family: 'Noto Serif JP', serif; font-size: 13px; cursor: pointer;
  text-align: left; transition: all 0.18s ease; position: relative; overflow: hidden;
  -webkit-appearance: none;
}
.choice-btn::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 2px; background: var(--red); opacity: 0; transition: opacity 0.18s;
}
.choice-btn:active { background: #1a1a2e; border-color: rgba(192,57,43,0.5); color: var(--white); transform: translateX(2px); }
.choice-btn:active::before { opacity: 1; }
.choice-btn:disabled { opacity: 0.25; pointer-events: none; }

/* エンドバナー */
.end-banner {
  align-self: center; text-align: center; padding: 16px 24px;
  border-radius: 12px; font-size: 13px; line-height: 1.8;
  animation: fadeUp 0.4s ease both; max-width: 90%;
}
.end-clear { background: rgba(46,204,113,0.07); border: 1px solid rgba(46,204,113,0.25); color: #8ecc8e; }
.end-dead  { background: rgba(192,57,43,0.07);  border: 1px solid rgba(192,57,43,0.25);  color: #cc8888; }
.end-badge {
  display: inline-block; padding: 2px 10px; border-radius: 20px;
  font-family: 'Share Tech Mono', monospace; font-size: 11px;
  letter-spacing: 0.1em; margin-bottom: 8px;
}
.badge-clear { background: rgba(46,204,113,0.15); color: #2ecc71; border: 1px solid rgba(46,204,113,0.35); }
.badge-dead  { background: rgba(192,57,43,0.15); color: var(--red-glow); border: 1px solid rgba(192,57,43,0.35); }

/* エンドアクション */
.end-actions {
  flex-shrink: 0; padding: 10px 12px 12px;
  display: flex; flex-direction: column; gap: 7px;
  border-top: 1px solid var(--border); background: rgba(8,8,16,0.9);
}
.btn-share {
  width: 100%; padding: 12px;
  background: linear-gradient(135deg, #06c755, #04a043);
  border: none; border-radius: 12px; color: #fff;
  font-family: 'Share Tech Mono', monospace; font-size: 13px;
  letter-spacing: 0.06em; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px; transition: opacity 0.15s;
}
.btn-share:active { opacity: 0.8; }
.btn-restart {
  width: 100%; padding: 11px; background: transparent;
  border: 1px solid rgba(192,57,43,0.35); border-radius: 12px;
  color: rgba(192,57,43,0.8); font-family: 'Share Tech Mono', monospace;
  font-size: 12px; letter-spacing: 0.1em; cursor: pointer; transition: all 0.15s;
}
.btn-restart:active { background: rgba(192,57,43,0.1); color: var(--red-glow); }

@keyframes flicker {
  0%,94%,100% { opacity: 1; } 95% { opacity: 0.5; } 96% { opacity: 0.9; } 97% { opacity: 0.3; }
}
.horror { animation: flicker 10s infinite; }

@keyframes flicker2 {
  0%,88%,100% { opacity: 1; } 89% { opacity: 0.2; } 90% { opacity: 0.8; }
  91% { opacity: 0.1; } 92% { opacity: 0.9; } 93% { opacity: 0.4; }
}
.grave-flicker { animation: flicker2 4s infinite; }
</style>
</head>
<body>

<div id="splash">
  <div class="splash-eye">👁</div>
  <div class="splash-title">深夜の廃ビル</div>
  <div class="splash-sub">URBAN HORROR RPG</div>
  <div class="splash-user" id="splashUser">読み込み中...</div>
  <div class="splash-dots"><span></span><span></span><span></span></div>
</div>

<div class="header">
  <div class="header-avatar" id="headerAvatar">👁</div>
  <div class="header-info">
    <div class="header-title" id="headerName">深夜の廃ビル</div>
    <div class="header-sub">都市ホラーRPG</div>
  </div>
  <div class="header-hp">
    <span id="hpLabel">HP 100</span>
    <div class="hp-mini-bar">
      <div class="hp-mini-fill" id="hpMiniFill" style="width:100%;background:#2ecc71"></div>
    </div>
  </div>
</div>

<div class="chat" id="chat"></div>
<div class="choices" id="choices"></div>

// エンドデータ
// ============================================================

  clear_special:  { badge: 'SPECIAL CLEAR', cls: 'end-clear', badgeCls: 'badge-clear', text: 'カメラが、あなたと友人を救った。\n証拠は全て壊れた。誰も信じないだろう。' },
  clear_exorcise: { badge: 'TRUE CLEAR',    cls: 'end-clear', badgeCls: 'badge-clear', text: '34人が、ようやく眠れた。\nあなたはそのことを、一生誰にも言わないだろう。' },
  clear_grave:    { badge: 'GRAVE CLEAR',   cls: 'end-clear', badgeCls: 'badge-clear', text: 'ここから先を——見てはいけない。\nあなたが持ち帰ったのは、友人だけではないかもしれない。' },
  dead:           { badge: 'GAME OVER',     cls: 'end-dead',  badgeCls: 'badge-dead',  text: 'あなたはビルに囚われた。\nまたいつか、誰かが助けに来るかもしれない。' }
};

// ============================================================
// 状態
// ============================================================
let state = { hp: 100, scene: 'start', isGraveRoute: false };
let liffReady = false;
let userProfile = null;

const chatEl    = document.getElementById('chat');
const choicesEl = document.getElementById('choices');

function scrollBottom() { requestAnimationFrame(() => { chatEl.scrollTop = chatEl.scrollHeight; }); }
function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

function addBubble(text, type = 'bot') {
  return new Promise(resolve => {
    requestAnimationFrame(() => {
      const div = document.createElement('div');
      const isGraveBot = state.isGraveRoute && type === 'bot';
      div.className = isGraveBot
        ? 'bubble grave grave-flicker'
        : `bubble ${type}${type === 'bot' ? ' horror' : ''}`;
      div.textContent = text;
      chatEl.appendChild(div);
      scrollBottom();
      setTimeout(resolve, 80);
    });
  });
}

function showTyping(ms = 800) {
  const el = document.createElement('div');
  el.className = 'typing';
  el.innerHTML = '<span></span><span></span><span></span>';
  chatEl.appendChild(el);
  scrollBottom();
  return new Promise(r => setTimeout(() => { el.remove(); r(); }, ms));
}

function updateHpUI(hp) {
  const pct   = Math.max(0, hp);
  const color = hp > 60 ? '#2ecc71' : hp > 30 ? '#f39c12' : '#e74c3c';
  document.getElementById('hpLabel').textContent = `HP ${hp}`;
  const fill = document.getElementById('hpMiniFill');
  fill.style.width = pct + '%';
  fill.style.background = color;
}

function addHpChip(hp) {
  const pct   = Math.max(0, hp);
  const color = hp > 60 ? '#2ecc71' : hp > 30 ? '#f39c12' : '#e74c3c';
  const div = document.createElement('div');
  div.className = 'hp-chip';
  div.innerHTML = `<span>精神力 ${hp}/100</span><div class="hp-chip-bar"><div class="hp-chip-fill" style="width:${pct}%;background:${color}"></div></div>`;
  chatEl.appendChild(div);
  scrollBottom();
}

function addSystemMsg(text) {
  const div = document.createElement('div');
  div.className = 'bubble system';
  div.textContent = text;
  chatEl.appendChild(div);
}

// ============================================================
// シーン処理
// ============================================================
async function showScene(key) {
  const scene = SCENES[key];
  if (!scene) return;
  state.scene = key;

  // グレイブルート突入判定
  const graveEntries = ['elevator_talk', 'floor5_grave', 'grave_enter', 'grave_wall'];
  if (graveEntries.includes(key) && !state.isGraveRoute) {
    state.isGraveRoute = true;
    await wait(300);
    addSystemMsg('— GRAVE ENCOUNTERS —');
    await wait(400);
  }

  choicesEl.innerHTML = '';

  if (scene.hpDelta) {
    state.hp = Math.max(0, state.hp + scene.hpDelta);
    updateHpUI(state.hp);
  }

  for (const line of scene.text) {
    const ms = Math.min(1600, 600 + line.length * 18);
    await showTyping(ms);
    await addBubble(line, 'bot');
    await wait(250);
  }

  if (scene.hpDelta && scene.hpDelta < 0) {
    addHpChip(state.hp);
    await wait(300);
  }

  if (state.hp <= 0 && !scene.isEnd) {
    await showTyping(700);
    await addBubble('頭が痛い。もう限界だ……精神が崩れていく。', 'bot');
    await wait(300);
    showEnd('dead');
    return;
  }

  if (scene.isEnd) { showEnd(scene.endType); return; }

  (scene.choices || []).forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c.label;
    btn.onclick = async () => {
      choicesEl.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
      choicesEl.innerHTML = '';
      await addBubble(c.label, 'user');
      await wait(280);
      showScene(c.next);
    };
    choicesEl.appendChild(btn);
  });
}

// ============================================================
// エンド
// ============================================================
function showEnd(type) {
  const data = END_DATA[type] || END_DATA.dead;
  choicesEl.innerHTML = '';

  const banner = document.createElement('div');
  banner.className = `end-banner ${data.cls}`;
  banner.innerHTML = `<div class="end-badge ${data.badgeCls}">${data.badge}</div><br>${data.text.replace(/\n/g,'<br>')}`;
  chatEl.appendChild(banner);
  scrollBottom();

  const actions = document.createElement('div');
  actions.className = 'end-actions';
  actions.id = 'endActions';

  if (liffReady && liff.isInClient()) {
    const shareBtn = document.createElement('button');
    shareBtn.className = 'btn-share';
    shareBtn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11A2.99 2.99 0 0 0 18 8a3 3 0 1 0-3-3c0 .24.04.47.09.7L8.04 9.81A3 3 0 0 0 6 9a3 3 0 1 0 3 3c0-.24-.04-.47-.09-.7l7.05-4.11c.52.47 1.2.77 1.96.77a3 3 0 0 0 0-6z"/></svg>結果をシェア`;
    shareBtn.onclick = () => shareResult(type);
    actions.appendChild(shareBtn);
  }

  const restartBtn = document.createElement('button');
  restartBtn.className = 'btn-restart';
  restartBtn.textContent = '▸ もう一度プレイする';
  restartBtn.onclick = restartGame;
  actions.appendChild(restartBtn);

  choicesEl.parentNode.replaceChild(actions, choicesEl);
}

// ============================================================
// シェア
// ============================================================
async function shareResult(type) {
  if (!liffReady) return;
  const name = userProfile?.displayName ?? 'プレイヤー';
  const msgs = {
    clear:          `👁 深夜の廃ビル\n${name}が友人を救出！\n恐怖を乗り越え夜明けへ——\n#深夜の廃ビル`,
    clear_special:  `📷 深夜の廃ビル\n${name}がカメラで謎を解いた！\nSPECIAL CLEARルート達成。\n#深夜の廃ビル`,
    clear_exorcise: `⛩ 深夜の廃ビル\n${name}が34人の霊を成仏させた。TRUE CLEAR。\n#深夜の廃ビル`,
    clear_grave:    `📹 深夜の廃ビル\n${name}がGRAVEルートをクリア。\nあの病院で——何を見たのか。\n#深夜の廃ビル #GraveEncounters`,
    dead:           `💀 深夜の廃ビル\n${name}は廃ビルに囚われた……\n「おかえり」——あの声が離れない。\n#深夜の廃ビル`
  };
  try {
    await liff.shareTargetPicker([{ type: 'text', text: msgs[type] || msgs.dead }]);
  } catch(e) { console.warn('share cancelled', e); }
}

// ============================================================
// リスタート
// ============================================================
function restartGame() {
  state = { hp: 100, scene: 'start', isGraveRoute: false };
  updateHpUI(100);
  const ea = document.getElementById('endActions');
  if (ea) {
    const nc = document.createElement('div');
    nc.className = 'choices'; nc.id = 'choices';
    ea.parentNode.replaceChild(nc, ea);
  }
  chatEl.innerHTML = '';
  addSystemMsg('— NEW GAME —');
  setTimeout(() => showScene('start'), 400);
}

// ============================================================
// LIFF初期化
// ============================================================
async function initLiff() {
  const splashUser = document.getElementById('splashUser');
  const splash     = document.getElementById('splash');

  try {
    await liff.init({ liffId: LIFF_ID });
    liffReady = true;
    if (liff.isLoggedIn()) {
      userProfile = await liff.getProfile();
      splashUser.textContent = `${userProfile.displayName} さん、ようこそ`;
      const avatar = document.getElementById('headerAvatar');
      if (userProfile.pictureUrl) {
        avatar.innerHTML = `<img src="${userProfile.pictureUrl}" alt="avatar">`;
      }
      document.getElementById('headerName').textContent = userProfile.displayName;
    } else {
      liff.login(); return;
    }
  } catch(e) {
    console.warn('LIFF init failed:', e);
    splashUser.textContent = '起動中...';
    liffReady = false;
  }

  await wait(1200);
  splash.classList.add('fade');
  setTimeout(() => splash.remove(), 700);
  addSystemMsg('— 深夜2:00 —');
  await wait(400);
  showScene('start');
}

window.addEventListener('DOMContentLoaded', initLiff);
