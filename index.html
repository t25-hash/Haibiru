// ============================================================
// ゲーム状態
// ============================================================
let state = { hp: 100, scene: 'start' };
let liffReady = false;
let userProfile = null;

// ============================================================
// UI ユーティリティ
// ============================================================
const chatEl    = document.getElementById('chat');
const choicesEl = document.getElementById('choices');

function scrollBottom() {
  requestAnimationFrame(() => { chatEl.scrollTop = chatEl.scrollHeight; });
}

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

function addBubble(text, type = 'bot') {
  return new Promise(resolve => {
    requestAnimationFrame(() => {
      const div = document.createElement('div');
      div.className = `bubble ${type}${type === 'bot' ? ' horror' : ''}`;
      div.textContent = text;
      chatEl.appendChild(div);
      scrollBottom();
      setTimeout(resolve, 80);
    });
  });
}

function showTyping(ms = 800) {
  const el = document.createElement('div');
  el.className = 'typing';
  el.innerHTML = '<span></span><span></span><span></span>';
  chatEl.appendChild(el);
  scrollBottom();
  return new Promise(r => setTimeout(() => { el.remove(); r(); }, ms));
}

function updateHpUI(hp) {
  const pct   = Math.max(0, hp);
  const color = hp > 60 ? '#2ecc71' : hp > 30 ? '#f39c12' : '#e74c3c';
  document.getElementById('hpLabel').textContent = `HP ${hp}`;
  const fill = document.getElementById('hpMiniFill');
  fill.style.width    = pct + '%';
  fill.style.background = color;
}

function addHpChip(hp) {
  const pct   = Math.max(0, hp);
  const color = hp > 60 ? '#2ecc71' : hp > 30 ? '#f39c12' : '#e74c3c';
  const div = document.createElement('div');
  div.className = 'hp-chip';
  div.innerHTML = `
    <span>精神力 ${hp}/100</span>
    <div class="hp-chip-bar">
      <div class="hp-chip-fill" style="width:${pct}%;background:${color}"></div>
    </div>`;
  chatEl.appendChild(div);
  scrollBottom();
}

// ============================================================
// シーン処理
// ============================================================
async function showScene(key) {
  const scene = SCENES[key];
  if (!scene) return;

  state.scene = key;
  choicesEl.innerHTML = '';

  // HP計算
  if (scene.hpDelta) {
    state.hp = Math.max(0, state.hp + scene.hpDelta);
    updateHpUI(state.hp);
  }

  // テキスト逐次表示
  for (const line of scene.text) {
    const typingMs = Math.min(1400, 600 + line.length * 20);
    await showTyping(typingMs);
    await addBubble(line, 'bot');
    await wait(250);
  }

  // HPチップ表示
  if (scene.hpDelta && scene.hpDelta < 0) {
    addHpChip(state.hp);
    await wait(300);
  }

  // HP0でゲームオーバー
  if (state.hp <= 0 && !scene.isEnd) {
    await showTyping(600);
    await addBubble('頭が痛い。もう限界だ……精神が崩れていく。', 'bot');
    await wait(300);
    showEnd('dead');
    return;
  }

  if (scene.isEnd) { showEnd(scene.endType); return; }

  // 選択肢描画
  scene.choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c.label;
    btn.onclick = async () => {
      disableChoices();
      choicesEl.innerHTML = '';
      await addBubble(c.label, 'user');
      await wait(280);
      showScene(c.next);
    };
    choicesEl.appendChild(btn);
  });
}

function disableChoices() {
  choicesEl.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
}

// ============================================================
// エンド表示
// ============================================================
function showEnd(type) {
  const isClear = type === 'clear';
  choicesEl.innerHTML = '';

  const banner = document.createElement('div');
  banner.className = `end-banner ${isClear ? 'end-clear' : 'end-dead'}`;
  banner.innerHTML = isClear
    ? `<div class="end-badge badge-clear">CLEAR</div><br>夜明けとともに、ビルは静かになった。<br>友人を連れ帰ることができた。`
    : `<div class="end-badge badge-dead">GAME OVER</div><br>あなたはビルに囚われた。<br>またいつか、誰かが助けに来るかもしれない。`;
  chatEl.appendChild(banner);
  scrollBottom();

  // エンドアクション（シェア + リスタート）
  const actions = document.createElement('div');
  actions.className = 'end-actions';
  actions.id = 'endActions';

  // LIFFシェアボタン
  if (liffReady && liff.isInClient()) {
    const shareBtn = document.createElement('button');
    shareBtn.className = 'btn-share';
    shareBtn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11A2.99 2.99 0 0 0 18 8a3 3 0 1 0-3-3c0 .24.04.47.09.7L8.04 9.81A3 3 0 0 0 6 9a3 3 0 1 0 3 3c0-.24-.04-.47-.09-.7l7.05-4.11c.52.47 1.2.77 1.96.77a3 3 0 0 0 0-6z"/></svg>結果をシェア`;
    shareBtn.onclick = () => shareResult(isClear);
    actions.appendChild(shareBtn);
  }

  const restartBtn = document.createElement('button');
  restartBtn.className = 'btn-restart';
  restartBtn.textContent = '▸ もう一度プレイする';
  restartBtn.onclick = restartGame;
  actions.appendChild(restartBtn);

  choicesEl.parentNode.replaceChild(actions, choicesEl);
}

// ============================================================
// LIFFシェア
// ============================================================
async function shareResult(isClear) {
  if (!liffReady) return;
  const name = userProfile?.displayName ?? 'プレイヤー';
  const msg  = isClear
    ? `👁 深夜の廃ビル\n${name}が友人を救出しました！\n恐怖を乗り越え、夜明けの空の下へ——\n#深夜の廃ビル #LINEホラーRPG`
    : `👁 深夜の廃ビル\n${name}は廃ビルに囚われてしまった……\n「おかえり」——あの笑い声が頭を離れない。\n#深夜の廃ビル #LINEホラーRPG`;

  try {
    await liff.shareTargetPicker([
      {
        type: 'text',
        text: msg
      }
    ]);
  } catch (e) {
    // シェアキャンセル or 非対応 → 無視
    console.warn('share cancelled', e);
  }
}

// ============================================================
// リスタート
// ============================================================
function restartGame() {
  state = { hp: 100, scene: 'start' };
  updateHpUI(100);

  // endActionsを choicesに戻す
  const ea = document.getElementById('endActions');
  if (ea) {
    const newChoices = document.createElement('div');
    newChoices.className = 'choices';
    newChoices.id = 'choices';
    ea.parentNode.replaceChild(newChoices, ea);
  }

  chatEl.innerHTML = '';
  addSystemMsg('— NEW GAME —');
  setTimeout(() => showScene('start'), 400);
}

function addSystemMsg(text) {
  const div = document.createElement('div');
  div.className = 'bubble system';
  div.textContent = text;
  chatEl.appendChild(div);
}

// ============================================================
// LIFF 初期化
// ============================================================
async function initLiff() {
  const splashUser = document.getElementById('splashUser');
  const splash     = document.getElementById('splash');

  try {
    await liff.init({ liffId: LIFF_ID });
    liffReady = true;

    if (liff.isLoggedIn()) {
      userProfile = await liff.getProfile();
      splashUser.textContent = `${userProfile.displayName} さん、ようこそ`;

      // ヘッダーにアバター反映
      const avatar = document.getElementById('headerAvatar');
      if (userProfile.pictureUrl) {
        avatar.innerHTML = `<img src="${userProfile.pictureUrl}" alt="avatar">`;
      }
      document.getElementById('headerName').textContent = `${userProfile.displayName}`;
    } else {
      splashUser.textContent = 'LINE未ログイン';
      liff.login();
      return;
    }

    if (!liff.isInClient()) {
      document.getElementById('liff-banner').style.display = 'block';
    }

  } catch (e) {
    // LIFF初期化失敗（ブラウザ直アクセスなど）→ ゲームは動かす
    console.warn('LIFF init failed:', e);
    splashUser.textContent = 'LINEなしモードで起動中';
    liffReady = false;
    document.getElementById('liff-banner').style.display = 'block';
  }

  // スプラッシュを消してゲーム開始
  await new Promise(r => setTimeout(r, 1200));
  splash.classList.add('fade');
  setTimeout(() => splash.remove(), 700);

  addSystemMsg('— 深夜2:00 —');
  await wait(400);
  showScene('start');
}

// ============================================================
// 起動
// ============================================================
window.addEventListener('DOMContentLoaded', initLiff);
</script>
</body>
</html>
